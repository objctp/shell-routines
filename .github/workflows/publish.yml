name: Publish NPM Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-github:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
      - run: node scripts/build.mjs
      # Remove the repo .npmrc so its @objctp scope mapping doesn't redirect
      # the publish; setup-node's registry + NODE_AUTH_TOKEN handle auth.
      - run: rm .npmrc
      - run: npm publish ./dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
